---
# Kasm role defaults — all variables the role consumes with safe defaults.
# Override in group_vars, host_vars, or by passing vars to the role.

# Action to perform. Override with -e kasm_action=<action> on the command line.
# Valid values: deploy, upgrade, uninstall, start, stop, restart, backup
kasm_action: deploy

# Services to install on this host
# Valid values: db, web, agent, guac, proxy
kasm_services:
  - db
  - web
  - agent
  - guac

# Zone this host belongs to
kasm_zone: zone1

# Zones defined in the deployment (must match inventory groups)
zones:
  - zone1

# Point all agents/guac/proxy to the first web server in the zone.
# Set false to pair each agent with its own web server.
default_web: true

# HTTPS proxy port
proxy_port: 443

# Enable Docker to start on boot
start_docker_on_boot: true

# Swap size to ensure is available on agent hosts
desired_swap_size: 5g

# PostgreSQL connection settings
database_hostname: false
database_user: kasmapp
database_name: kasm
database_port: 5432
database_ssl: true

# Remote DB initialisation — set true only on first run with an external DB
init_remote_db: false

# Credentials — leave empty to auto-generate on first run
vault_user_password: ""
vault_admin_password: ""
vault_database_password: ""
vault_manager_token: ""
vault_registration_token: ""

user_password:     "{{ vault_user_password }}"
admin_password:    "{{ vault_admin_password }}"
database_password: "{{ vault_database_password }}"
manager_token:     "{{ vault_manager_token }}"
registration_token: "{{ vault_registration_token }}"

# Database backup
remote_backup_dir: /srv/backup/kasm/
retention_days: 10

# Database restore
kasm_restore_file: ""          # Path to backup tar.gz to restore from
kasm_restore_remote: false     # true = file is already on the target host

# Certificates
# Set kasm_certs_remote: false if cert files live on the Ansible control node (default).
# Set kasm_certs_remote: true  if cert files are already present on the target host.
kasm_certs_remote: false
kasm_server_cert: ""   # Path to server certificate (PEM)
kasm_server_key: ""    # Path to server private key (PEM)
kasm_root_ca: ""       # Path to custom root CA — required for OIDC provider trust
kasm_root_ca_dest: /srv/ca.crt  # Destination path on the target host for the root CA

# Installer source
# Place a kasm_release_*.tar.gz in files/ OR set kasm_installer_url to a full
# download URL (Kasm S3, Nexus, internal mirror, etc.).
# files/ takes precedence if both are provided.
kasm_installer_url: ""

# Licence
# Filename of the activation key file placed in the role's files/ directory.
# Leave empty to install without a licence key.
kasm_activation_key_file: ""

# Hostname
# Target hostname for kasm_action=rename. Defaults to the current OS hostname (ansible_hostname).
kasm_hostname: ""

# Optional installer feature flags — all off by default.
kasm_enable_lossless: false        # Enable lossless streaming option
kasm_default_registry_url: ""      # Override Workspaces Registry URL (empty = use Kasm default)
kasm_guac_cluster_size: ""         # Number of guacd instances on guac hosts. Empty = installer default (1 per CPU core).
                                   # Override with an explicit count to limit or exceed the per-core default.
kasm_no_check_ports: false         # Disable open port checks
kasm_no_check_disk: false          # Disable disk space checks
