---
# Remove all Kasm containers, images, volumes, networks, and /opt/kasm.
# Remote databases are not touched — data there persists.

- name: Remove Kasm service containers
  community.docker.docker_container:
    name: "{{ item }}"
    state: absent
    force_kill: true
  become: true
  ignore_errors: true
  loop:
    - kasm_db
    - kasm_api
    - kasm_manager
    - kasm_agent
    - kasm_guac
    - kasm_rdp_gateway
    - kasm_rdp_https_gateway
    - kasm_proxy

- name: Get Kasm session container info
  community.docker.docker_host_info:
    containers: true
    containers_all: true
    containers_filters:
      label: kasm.kasmid
  become: true
  register: _session_info
  ignore_errors: true

- name: Remove Kasm session containers
  community.docker.docker_container:
    name: "{{ item.Names[0] | regex_replace('^/', '') }}"
    state: absent
    force_kill: true
  become: true
  ignore_errors: true
  loop: "{{ _session_info.containers | default([]) }}"

- name: Remove Kasm networks
  community.docker.docker_network:
    name: "{{ item }}"
    state: absent
    force: true
  become: true
  ignore_errors: true
  loop:
    - kasm_default_network
    - kasm_sidecar_network

- name: Get Kasm database volume info
  community.docker.docker_host_info:
    volumes: true
    volumes_filters:
      name: kasm_db_
  become: true
  register: _volume_info
  ignore_errors: true

- name: Remove Kasm database volumes
  community.docker.docker_volume:
    name: "{{ item.Name }}"
    state: absent
  become: true
  ignore_errors: true
  loop: "{{ _volume_info.volumes | default([]) }}"

# Images have multiple tags per image ID; command handles deduplication cleanly.
- name: Get Kasm Docker image IDs
  ansible.builtin.shell: |
    docker images --filter "label=com.kasmweb.image=true" -q
    docker images kasmweb/nginx -q
    docker images kasmweb/agent -q
    docker images kasmweb/agent-private -q
    docker images kasmweb/manager -q
    docker images kasmweb/manager-private -q
    docker images kasmweb/api -q
    docker images kasmweb/api-private -q
    docker images kasmweb/guac -q
    docker images kasmweb/guac-private -q
    docker images kasmweb/kasm-guac -q
    docker images kasmweb/kasm-guac-private -q
    docker images kasmweb/proxy -q
    docker images kasmweb/rdp-gateway -q
    docker images kasmweb/rdp-gateway-private -q
    docker images kasmweb/rdp-https-gateway -q
    docker images kasmweb/rdp-https-gateway-private -q
    docker images postgres -q
  register: kasm_images
  become: true
  ignore_errors: true
  changed_when: false

- name: Remove Kasm Docker images
  ansible.builtin.command: "docker rmi {{ item }}"
  become: true
  ignore_errors: true
  changed_when: true
  loop: "{{ kasm_images.stdout_lines | unique }}"

# No Ansible module for Docker plugins — command is the only option.
- name: List Docker plugins
  ansible.builtin.command: docker plugin ls
  become: true
  ignore_errors: true
  changed_when: false
  register: plugin_list

- name: Identify Kasm sidecar network plugin
  ansible.builtin.set_fact:
    sidecar_plugins: "{{ plugin_list.stdout_lines | select('match', '.*Kasm Network plugin for Docker.*') | list }}"

- name: Disable Kasm sidecar plugin
  ansible.builtin.command: "docker plugin disable {{ item.split()[1] }}"
  become: true
  changed_when: true
  loop: "{{ sidecar_plugins }}"

- name: Remove Kasm sidecar plugin
  ansible.builtin.command: "docker plugin rm {{ item.split()[1] }}"
  become: true
  changed_when: true
  loop: "{{ sidecar_plugins }}"

- name: Remove Kasm installation directory
  ansible.builtin.file:
    path: /opt/kasm/
    state: absent
  become: true
