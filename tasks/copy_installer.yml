---
- name: Locate installer and image tarballs on control node
  ansible.builtin.set_fact:
    installer_glob:        "{{ lookup('fileglob', role_path + '/files/kasm_workspaces_*.tar.gz', wantlist=True) + lookup('fileglob', role_path + '/files/kasm_release_*.tar.gz', wantlist=True) }}"
    service_images_glob:   "{{ lookup('fileglob', role_path + '/files/kasm_workspaces_service_images*.tar.gz', wantlist=True) + lookup('fileglob', role_path + '/files/kasm_release_service_images*.tar.gz', wantlist=True) }}"
    workspace_images_glob: "{{ lookup('fileglob', role_path + '/files/kasm_workspaces_workspace_images_*.tar.gz', wantlist=True) + lookup('fileglob', role_path + '/files/kasm_release_workspace_images_*.tar.gz', wantlist=True) }}"
    network_plugin_glob:   "{{ lookup('fileglob', role_path + '/files/kasmweb_network_plugin_*.tar.gz', wantlist=True) }}"
  when: kasm_installer_file is not defined or kasm_installer_file | length == 0
  delegate_to: localhost
  tags: [install, upgrade]

- name: Resolve installer and optional image file paths
  ansible.builtin.set_fact:
    _base_glob: "{{ installer_glob | default([]) | difference(service_images_glob | default([])) | difference(workspace_images_glob | default([])) }}"
  tags: [install, upgrade]

- name: Resolve installer file
  ansible.builtin.set_fact:
    installer_file: >-
      {%- if kasm_installer_file is defined and kasm_installer_file | length > 0 -%}
        {{ kasm_installer_file }}
      {%- elif version is defined and version | length > 0 -%}
        {{ _base_glob | select('search', version | regex_escape) | list | sort | last | default(None) }}
      {%- else -%}
        {{ _base_glob | sort | last | default(None) }}
      {%- endif -%}
    service_images_file:   "{{ service_images_glob  | default([]) | sort | last | default(None) }}"
    workspace_images_file: "{{ workspace_images_glob | default([]) | sort | last | default(None) }}"
    network_plugin_file:   "{{ network_plugin_glob   | default([]) | sort | last | default(None) }}"
  tags: [install, upgrade]

- name: Show selected installer
  ansible.builtin.debug:
    msg: >-
      Using installer: {{ installer_file | basename }}
      {%- if kasm_installer_file is defined and kasm_installer_file | length > 0 %} (pinned via kasm_installer_file)
      {%- elif version is defined and version | length > 0 %} (matched version={{ version }})
      {%- else %} (latest found in files/)
      {%- endif %}
  tags: [install, upgrade]

- name: Assert Kasm installer tarball is present
  ansible.builtin.assert:
    that:
      - installer_file is not none
      - installer_file | length > 0
    fail_msg: >-
      Kasm installer not found.
      {% if version is defined and version | length > 0 %}No tarball matching version={{ version }} in {{ role_path }}/files/{% else %}Place a kasm_release_*.tar.gz in {{ role_path }}/files/{% endif %}
  tags: [install, upgrade]

- name: Unarchive Kasm installer to temp directory
  ansible.builtin.unarchive:
    src: "{{ installer_file }}"
    dest: "{{ tempdir.path }}"
  tags: [install, upgrade]

- name: Copy service images to target
  ansible.builtin.copy:
    src: "{{ service_images_file }}"
    dest: "{{ tempdir.path }}"
  register: service_images_copy
  when: service_images_file is not none and service_images_file | length > 0
  tags: [install, upgrade]

- name: Copy workspace images to target
  ansible.builtin.copy:
    src: "{{ workspace_images_file }}"
    dest: "{{ tempdir.path }}"
  register: workspace_images_copy
  when: workspace_images_file is not none and workspace_images_file | length > 0
  tags: [install, upgrade]

- name: Copy network plugin to target
  ansible.builtin.copy:
    src: "{{ network_plugin_file }}"
    dest: "{{ tempdir.path }}"
  register: network_plugin_copy
  when: network_plugin_file is not none and network_plugin_file | length > 0
  tags: [install, upgrade]
