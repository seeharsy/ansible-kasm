---
# Apply custom TLS certificates and root CA to Kasm.
# Run standalone with kasm_action=certs, or automatically at the end of upgrade.
#
# kasm_server_cert — path to server certificate (PEM)
# kasm_server_key  — path to server private key (PEM)
# kasm_root_ca     — path to custom root CA (required for OIDC provider trust)
# kasm_certs_remote — false (default): paths are on the Ansible control node
#                     true: paths are already on the target host
#
# cert/key are written to /opt/kasm/current/certs/ via the symlink — version-agnostic
# and automatically picked up by proxy, rdp_gateway, and rdp_https_gateway containers.
#
# root CA is copied to kasm_root_ca_dest on the host and injected into kasm_api and
# kasm_manager via a docker-compose.override.yml with REQUESTS_CA_BUNDLE set.

- name: Copy server certificate from control node
  ansible.builtin.copy:
    src: "{{ kasm_server_cert }}"
    dest: /opt/kasm/current/certs/kasm_nginx.crt
    mode: "0644"
  become: true
  when: kasm_server_cert | length > 0 and not kasm_certs_remote
  register: _cert_copy_local

- name: Copy server certificate from target host
  ansible.builtin.copy:
    src: "{{ kasm_server_cert }}"
    dest: /opt/kasm/current/certs/kasm_nginx.crt
    mode: "0644"
    remote_src: true
  become: true
  when: kasm_server_cert | length > 0 and kasm_certs_remote
  register: _cert_copy_remote

- name: Copy server private key from control node
  ansible.builtin.copy:
    src: "{{ kasm_server_key }}"
    dest: /opt/kasm/current/certs/kasm_nginx.key
    mode: "0600"
  become: true
  when: kasm_server_key | length > 0 and not kasm_certs_remote
  register: _key_copy_local

- name: Copy server private key from target host
  ansible.builtin.copy:
    src: "{{ kasm_server_key }}"
    dest: /opt/kasm/current/certs/kasm_nginx.key
    mode: "0600"
    remote_src: true
  become: true
  when: kasm_server_key | length > 0 and kasm_certs_remote
  register: _key_copy_remote

- name: Copy root CA to host from control node
  ansible.builtin.copy:
    src: "{{ kasm_root_ca }}"
    dest: "{{ kasm_root_ca_dest }}"
    mode: "0644"
  become: true
  when: kasm_root_ca | length > 0 and not kasm_certs_remote
  register: _ca_copy_local

- name: Copy root CA to host from target host
  ansible.builtin.copy:
    src: "{{ kasm_root_ca }}"
    dest: "{{ kasm_root_ca_dest }}"
    mode: "0644"
    remote_src: true
  become: true
  when: kasm_root_ca | length > 0 and kasm_certs_remote
  register: _ca_copy_remote

- name: Template docker-compose override to inject root CA into kasm_api and kasm_manager
  ansible.builtin.template:
    src: docker-compose.override.yml.j2
    dest: /opt/kasm/current/docker/docker-compose.override.yml
    mode: "0644"
  become: true
  when: kasm_root_ca | length > 0
  register: _compose_modified

- name: Set cert changes fact
  ansible.builtin.set_fact:
    _kasm_certs_changed: >-
      {{
        (_cert_copy_local    is defined and _cert_copy_local    is changed) or
        (_cert_copy_remote   is defined and _cert_copy_remote   is changed) or
        (_key_copy_local     is defined and _key_copy_local     is changed) or
        (_key_copy_remote    is defined and _key_copy_remote    is changed) or
        (_ca_copy_local      is defined and _ca_copy_local      is changed) or
        (_ca_copy_remote     is defined and _ca_copy_remote     is changed) or
        (_compose_modified   is defined and _compose_modified   is changed)
      }}

- name: Stop Kasm to apply certificate changes
  ansible.builtin.command: /opt/kasm/bin/stop
  become: true
  changed_when: true
  when: _kasm_certs_changed

- name: Start Kasm after certificate changes
  ansible.builtin.command: /opt/kasm/bin/start
  become: true
  changed_when: true
  when: _kasm_certs_changed
