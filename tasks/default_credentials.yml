---
# Load credentials from vault vars, or generate them if not set.
# Generated credentials are written to vault.yml at the end of a deploy.

- name: Generate database_password if not set
  ansible.builtin.set_fact:
    database_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"
  when: not database_password
  run_once: true
  delegate_to: localhost

- name: Generate user_password if not set
  ansible.builtin.set_fact:
    user_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"
  when: not user_password
  run_once: true
  delegate_to: localhost

- name: Generate admin_password if not set
  ansible.builtin.set_fact:
    admin_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"
  when: not admin_password
  run_once: true
  delegate_to: localhost

- name: Generate manager_token if not set
  ansible.builtin.set_fact:
    manager_token: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"
  when: not manager_token
  run_once: true
  delegate_to: localhost

- name: Generate registration_token if not set
  ansible.builtin.set_fact:
    registration_token: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=22') }}"
  when: not registration_token
  run_once: true
  delegate_to: localhost

# run_once only sets facts on the first host — share generated values to all hosts
# so every node in a multi-host deploy uses the same credentials.
- name: Share generated credentials to all hosts
  ansible.builtin.set_fact:
    database_password: "{{ hostvars[ansible_play_hosts | sort | first].database_password }}"
    user_password:     "{{ hostvars[ansible_play_hosts | sort | first].user_password }}"
    admin_password:    "{{ hostvars[ansible_play_hosts | sort | first].admin_password }}"
    manager_token:     "{{ hostvars[ansible_play_hosts | sort | first].manager_token }}"
    registration_token: "{{ hostvars[ansible_play_hosts | sort | first].registration_token }}"
